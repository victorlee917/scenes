name: Deploy web to GitHub Pages

# main 브랜치에 web/ 가 변경되면 자동 빌드 → GH Pages로 배포.
# 수동 실행도 가능 (workflow_dispatch).
#
# 전제: 레포 Settings → Pages → Source = "GitHub Actions" 설정 필요 (한 번만).
# 배포 URL: https://<user>.github.io/<repo>/  (현재: scenes 레포 → /scenes/ base).

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 deploy 충돌 방지 — in-progress run은 새 푸시가 오면 취소.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      # SPA fallback — /scenes/privacy 같은 클라이언트 라우트로 직접 진입했을 때
      # GH Pages가 404를 반환하면서 같은 페이지의 404.html을 서빙한다. index.html
      # 사본을 두면 React Router가 부팅해서 URL을 처리.
      - run: cp build/client/index.html build/client/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/build/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
